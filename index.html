<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Solidaria Emma - Panamericano 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@500&display=swap');
        
        *{box-sizing:border-box;margin:0;padding:0}
        
        .rw{
            font-family:'Nunito',sans-serif;
            background: 
                linear-gradient(rgba(11, 31, 163, 0.45), rgba(10, 21, 128, 0.5), rgba(7, 16, 96, 0.65)),
                url('image-emma.jpg') center/cover no-repeat fixed;
            min-height:100vh;
            padding:1.5rem 1rem 2.5rem;
            position:relative;
            color: #fff;
        }

        .rh{text-align:center; position:relative; z-index:2; margin-bottom:1.5rem}
        .rbadge{display:inline-block;background:linear-gradient(135deg,#75D94F,#4FC23A);color:#0A1A50;font-size:22px;font-weight:800;padding:4px 12px;border-radius:20px;margin-bottom:8px;text-transform:uppercase}
        .rh h1{font-family:'Bebas Neue',cursive;font-size:52px;text-shadow:0 2px 15px rgba(0,0,0,0.8);line-height:1}
        .rh h1 span{color:#75D94F}
        .rh p{font-size:14px; font-weight:700; text-shadow:0 1px 5px #000}

        .rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:6px;margin-bottom:1.5rem;position:relative;z-index:2}
        
        /* BOTONES DE NÚMEROS */
        .nBtn{height:42px; border-radius:8px; border:1px solid rgba(255,255,255,0.4); background:rgba(10, 25, 80, 0.7); color:#fff; font-family:'DM Mono'; font-weight:700; cursor:pointer; backdrop-filter:blur(4px)}
        .nBtn.act{background:#75D94F; color:#0A1A50; border-color:#75D94F; transform:scale(1.05)}
        
        /* ESTILO PARA NÚMEROS YA RESERVADOS (PARA TODOS) */
        .nBtn.tkn{
            background: #222 !important; 
            color: rgba(255,255,255,0.2) !important;
            border-color: rgba(255,255,255,0.1) !important;
            text-decoration: line-through;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .rpanel{background:rgba(10, 25, 80, 0.9); border:2px solid #75D94F; border-radius:12px; padding:1.2rem; margin-bottom:1.1rem; display:none; position:relative; z-index:2; backdrop-filter:blur(10px)}
        .rpanel.vis{display:block}
        .sel-nums{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;padding:8px;background:rgba(0,0,0,0.4);border-radius:8px}
        .sel-pill{background:#75D94F;color:#0A1A50;font-size:12px;font-weight:800;padding:4px 10px;border-radius:20px}
        
        input{width:100%;padding:12px;border-radius:8px;border:none;margin-bottom:10px;font-weight:700;font-size:16px; color:#000}
        .rbtn-p{width:100%; padding:12px; background:#75D94F; color:#0A1A50; font-weight:800; border:none; border-radius:8px; cursor:pointer; font-size:15px}
        
        .raliascard{background:rgba(10, 25, 80, 0.85); border-radius:12px; padding:1.2rem; text-align:center; position:relative; z-index:2; border:1px solid rgba(255,255,255,0.2)}
        .ralias-val{font-family:'DM Mono'; font-size:26px; color:#75D94F; margin:5px 0; font-weight:700}
    </style>
</head>
<body>
<div class="rw">
    <div class="rh">
        <div class="rbadge">Rifa Solidaria · Emma<br><strong>PANAMERICANO 2026</strong><br><br><br></div>
        <h1>¡Elegí tu<span> número!</span></h1>
        <p>Valor por número: <span style="color:#75D94F; font-size:2em">$5.000</span></p>
    </div>

    <div class="rpanel" id="panel">
        <h2 style="font-size:16px; margin-bottom:8px">Tus números seleccionados:</h2>
        <div class="sel-nums" id="selnums"></div>
        <input type="text" id="nminput" placeholder="Tu nombre y apellido">
        <button class="rbtn-p" id="cbtn" onclick="doConfirm()">Confirmar y enviar reserva</button>
        <p id="pnote" style="font-size:13px; margin-top:10px; text-align:center; font-weight:800"></p>
    </div>

    <div class="rgrid" id="grid"></div>

    <div class="raliascard">
        <p style="font-size:10px; text-transform:uppercase; letter-spacing:1px">Alias Mercado Pago</p>
        <div class="ralias-val">emmabuffa.mp</div>
        <p style="font-size:12px">Luego de reservar, transferí el total e <br><strong>incluí tu nombre en la referencia</strong><br><br>¡Muchas gracias por ayudarme a cumplir este sueño!</p>
    </div>
</div>

<script>
// --- CONFIGURACIÓN ---
const EMAIL_DESTINO = 'brunobuffa77@gmail.com';
const PRICE = 5000;
const STORAGE_KEY = 'rifa-emma-v1';

// 1. AQUÍ AGREGÁS LOS NÚMEROS QUE YA ESTÁN RESERVADOS PARA TODOS
// Ejemplo: [5, 12, 45]
const LISTA_MAESTRA_RESERVADOS = [3,4,5]; 

let selSet = new Set();
let localTaken = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

function renderGrid(){
    const g = document.getElementById('grid'); g.innerHTML = '';
    for(let i=1; i<=200; i++){
        const b = document.createElement('button');
        b.className = 'nBtn'; b.textContent = i;
        
        // Bloquea si está en la lista global o si este usuario ya lo reservó antes
        if(LISTA_MAESTRA_RESERVADOS.includes(i) || localTaken.includes(i)){ 
            b.classList.add('tkn');
            b.disabled = true;
        } else if(selSet.has(i)){ 
            b.classList.add('act'); 
        }
        
        b.onclick = () => toggleNum(i);
        g.appendChild(b);
    }
}

function toggleNum(n){
    selSet.has(n) ? selSet.delete(n) : selSet.add(n);
    renderGrid();
    const p = document.getElementById('panel');
    p.classList.toggle('vis', selSet.size > 0);
    document.getElementById('selnums').innerHTML = [...selSet].map(n => `<span class="sel-pill">#${n}</span>`).join('');
    document.getElementById('pnote').textContent = `Total a pagar: $${(selSet.size * PRICE).toLocaleString('es-AR')}`;
}

async function doConfirm(){
    const name = document.getElementById('nminput').value.trim();
    if(!name){ alert("Por favor, ingresá tu nombre."); return; }
    
    const btn = document.getElementById('cbtn');
    btn.disabled = true; btn.textContent = "Enviando...";

    const nums = [...selSet].sort((a,b)=>a-b);
    
    // ENVÍO DE EMAIL (FormSubmit)
    const formData = new FormData();
    formData.append('Interesado', name);
    formData.append('Números Elegidos', nums.join(', '));
    formData.append('Monto Total', `$${(nums.length * PRICE).toLocaleString('es-AR')}`);
    formData.append('_subject', `NUEVA RESERVA RIFA: ${name}`);
    formData.append('_captcha', 'false');

    try {
        await fetch(`https://formsubmit.co/ajax/${EMAIL_DESTINO}`, {
            method: 'POST',
            body: formData
        });
        
        // Guardar localmente para que este usuario vea sus números bloqueados
        localTaken = [...localTaken, ...nums];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(localTaken));
        
        alert("¡Pedido de reserva enviado! Recordá realizar la transferencia.\nRecibirás un mail de confirmación pronto.");
        selSet.clear();
        location.reload();
    } catch(e) {
        alert("Hubo un error al enviar. Por favor intentá de nuevo.");
        btn.disabled = false; btn.textContent = "Confirmar y enviar reserva";
    }
}

renderGrid();
</script>
</body>
</html>
